services:
  node-backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/frontend
      
  barista-staff-backend:
    build: ./Barista-Food-Staff/backend
    ports:
      - "3001:3001"
    volumes:
      - ./Barista-Food-Staff/frontend:/usr/src/frontend

  go-backend:
    build: ./backend-go 
    ports:
      - "8080:8080"
    volumes:
      - ./backend-go/frontend:/usr/src/frontend
    env_file:
      - ./backend-go/.env