<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Reports | Barista Coffee Chain</title>
    <link rel="icon" type="image/png" href="assests/hero-image.png">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Custom Dashboard CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .report-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .report-card:hover {
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transform: translateY(-3px);
        }

        .hidden {
            display: none !important;
        }

        .widget-placeholder {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            border-radius: 8px;
            color: #6c757d;
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="bi bi-cup-hot-fill text-gold fs-2"></i>
                <h4 class="mb-0 fw-bold">Barista Chain</h4>
            </div>

            <nav class="sidebar-nav">
                <a href="user.html" class="nav-item">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="reports.html" class="nav-item active">
                    <i class="bi bi-file-earmark-bar-graph"></i>
                    <span>Custom Reports</span>
                </a>
                <a href="reviews.html" class="nav-item">
                    <i class="bi bi-chat-left-quote"></i>
                    <span>Reviews Analysis</span>
                </a>
                <a href="chatbot.html" class="nav-item">
                    <i class="bi bi-robot"></i>
                    <span>AI Chatbot</span>
                </a>
                <a href="map.html" class="nav-item">
                    <i class="bi bi-pin-map"></i>
                    <span>Manage Locations</span>
                </a>
                <a href="users.html" class="nav-item">
                    <i class="bi bi-people"></i>
                    <span>Registered Users</span>
                </a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-item">
                    <i class="bi bi-gear"></i>
                    <span>Settings</span>
                </a>
                <a href="../index.html" class="nav-item">
                    <i class="bi bi-box-arrow-left"></i>
                    <span>Logout</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://i.pravatar.cc/150?img=12" alt="User" class="profile-img">
                    <div class="user-info">
                        <div class="user-name">John Doe</div>
                        <div class="user-role">Administrator</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navigation Bar -->
            <nav class="topbar">
                <button class="btn btn-link sidebar-toggle" id="sidebarToggle">
                    <i class="bi bi-list fs-4"></i>
                </button>
                <h5 class="mb-0 fw-bold">Custom Reports</h5>
                <div class="topbar-actions">
                    <button class="btn btn-primary rounded-pill" onclick="openCreateReportModal()">
                        <i class="bi bi-plus-circle"></i> Create Report
                    </button>
                    <button class="btn btn-light rounded-pill">
                        <i class="bi bi-bell"></i>
                        <span class="badge bg-danger">3</span>
                    </button>
                </div>
            </nav>

            <!-- Dashboard Content -->
            <div class="content-area">

                <!-- Reports Listing View -->
                <div id="reportsListContainer">
                    <div class="dashboard-card mb-4">
                        <div class="card-header">
                            <h5 class="mb-0">Your Custom Layouts</h5>
                        </div>
                        <div class="card-body">
                            <div class="row" id="reportsGrid">
                                <!-- Reports loaded dynamically via JS -->
                            </div>
                            <div id="noReportsMessage" class="text-center py-5 hidden">
                                <i class="bi bi-file-earmark-bar-graph fs-1 text-muted"></i>
                                <p class="mt-2 text-muted">No custom reports found. Create one to get started!</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Single Report View (Initially Hidden) -->
                <div id="singleReportContainer" class="hidden">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <button class="btn btn-sm btn-outline-secondary me-3" onclick="closeSingleReport()">
                                <i class="bi bi-arrow-left"></i> Back to Reports
                            </button>
                            <h4 id="reportTitle" class="d-inline-block mb-0 align-middle">Report Title</h4>
                        </div>
                        <div>
                            <button class="btn btn-sm btn-outline-primary me-2" onclick="editCurrentReport()">
                                <i class="bi bi-pencil"></i> Edit
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteCurrentReport()">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </div>
                    </div>

                    <!-- Dynamic Widgets Area -->
                    <div class="row g-4" id="reportWidgetsArea">
                        <!-- Widgets will be mounted here -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Create/Edit Report Modal -->
    <div class="modal fade" id="reportModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="reportModalTitle"><i class="bi bi-plus-circle me-2"></i>Create Custom
                        Report</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="reportForm">
                        <input type="hidden" id="reportId">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Report Title *</label>
                            <input type="text" class="form-control" id="formReportTitle" required
                                placeholder="e.g., Weekly Sentiment Overview">
                        </div>

                        <label class="form-label fw-bold">Select Widgets (Components to include) *</label>

                        <div class="form-check mb-2">
                            <input class="form-check-input widget-checkbox" type="checkbox" value="reviewTrends"
                                id="widgetReviewTrends">
                            <label class="form-check-label" for="widgetReviewTrends">
                                Review Trends Chart (Line Graph)
                            </label>
                        </div>

                        <div class="form-check mb-2">
                            <input class="form-check-input widget-checkbox" type="checkbox" value="sentimentDist"
                                id="widgetSentimentDist">
                            <label class="form-check-label" for="widgetSentimentDist">
                                Sentiment Distribution (Doughnut Chart)
                            </label>
                        </div>

                        <div class="form-check mb-2">
                            <input class="form-check-input widget-checkbox" type="checkbox" value="topBranches"
                                id="widgetTopBranches">
                            <label class="form-check-label" for="widgetTopBranches">
                                Top Performing Branches List
                            </label>
                        </div>

                        <div class="form-check mb-2">
                            <input class="form-check-input widget-checkbox" type="checkbox" value="dashboardStats"
                                id="widgetDashboardStats">
                            <label class="form-check-label" for="widgetDashboardStats">
                                Dashboard KPI Stats (Top 4 Cards)
                            </label>
                        </div>

                        <div class="form-check mb-2">
                            <input class="form-check-input widget-checkbox" type="checkbox" value="branchPerformance"
                                id="widgetBranchPerformance" onchange="toggleBranchSelect()">
                            <label class="form-check-label" for="widgetBranchPerformance">
                                Specific Branch Performance
                            </label>
                        </div>
                        <div id="branchSelectContainer" class="mb-3 hidden ps-4">
                            <label class="form-label fw-bold text-muted small">Select Branch</label>
                            <select class="form-select form-select-sm" id="branchSelect">
                                <option value="">Loading branches...</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="reportSubmitBtn" onclick="saveReport()">
                        <i class="bi bi-save"></i> Save Report
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Core App JS -->
    <!-- We include dashboard.js for the floating chatbot and global logic -->
    <script src="js/dashboard.js"></script>
    <script src="js/reports.js"></script>
</body>

</html>
