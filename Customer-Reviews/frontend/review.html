<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barista Review - We Value Your Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfaf6;
            --card-bg: #ffffff;
            --text-dark: #2c1e16;
            --text-muted: #6b5c53;
            --primary: #c27a3e;
            --primary-hover: #b0652d;
            --border-color: #e5dacd;
            --input-bg: #f9f5f0;
            --star-inactive: #dcd1c6;
            --star-active: #ffb800;
            --shadow-sm: 0 4px 6px rgba(44, 30, 22, 0.05);
            --shadow-lg: 0 20px 40px rgba(44, 30, 22, 0.08);
            --radius-md: 12px;
            --radius-lg: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .review-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 540px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .review-header {
            background: linear-gradient(135deg, var(--primary), #8a4e21);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
        }

        .review-header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 40px;
            background: var(--card-bg);
            border-radius: 50% 50% 0 0;
        }

        .review-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .review-header p {
            font-size: 0.95rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .review-form {
            padding: 2rem 2.5rem 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .form-label span {
            color: #ef4444;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--input-bg);
            color: var(--text-dark);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(194, 122, 62, 0.15);
            background-color: var(--card-bg);
        }

        .form-control::placeholder {
            color: #a39485;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        /* Star Rating System */
        .rating-group {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 0.5rem;
            margin: 1rem 0 2rem;
        }

        .rating-input {
            display: none;
        }

        .rating-label {
            cursor: pointer;
            color: var(--star-inactive);
            font-size: 2.5rem;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .rating-label:hover,
        .rating-label:hover ~ .rating-label,
        .rating-input:checked ~ .rating-label {
            color: var(--star-active);
        }

        .rating-label:hover {
            transform: scale(1.1);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.05rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(194, 122, 62, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(194, 122, 62, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Success Message */
        .success-message {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #ecfdf5;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        .success-message h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .success-message p {
            color: var(--text-muted);
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .review-form {
                padding: 1.5rem 1.5rem 2rem;
            }
            .review-header {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="review-container">
        <!-- Success State -->
        <div class="success-message" id="successMessage">
            <div class="success-icon">✓</div>
            <h2>Thank You!</h2>
            <p>Your review has been successfully submitted. We appreciate your feedback and hope to see you again soon.</p>
        </div>

        <!-- Form State -->
        <div id="formContainer">
            <div class="review-header">
                <h1>Rate Your Barista</h1>
                <p>Loved your coffee? Let us know!</p>
            </div>
            
            <form class="review-form" id="reviewForm">
                
                <div class="form-group" style="text-align: center;">
                    <label class="form-label" style="font-size: 1.1rem; margin-bottom: 0;">How was your experience? <span>*</span></label>
                    <div class="rating-group">
                        <!-- Reverse order for CSS sibling selector logic -->
                        <input type="radio" id="star5" name="rating" value="5" class="rating-input" required>
                        <label for="star5" class="rating-label">★</label>
                        
                        <input type="radio" id="star4" name="rating" value="4" class="rating-input">
                        <label for="star4" class="rating-label">★</label>
                        
                        <input type="radio" id="star3" name="rating" value="3" class="rating-input">
                        <label for="star3" class="rating-label">★</label>
                        
                        <input type="radio" id="star2" name="rating" value="2" class="rating-input">
                        <label for="star2" class="rating-label">★</label>
                        
                        <input type="radio" id="star1" name="rating" value="1" class="rating-input">
                        <label for="star1" class="rating-label">★</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="branch_id" class="form-label">Branch Name <span>*</span></label>
                    <input type="text" id="branch_id" name="branch_id" class="form-control" placeholder="e.g. Downtown Cafe" required>
                </div>

                <div class="form-group">
                    <label for="review_text" class="form-label">Your Review <span>*</span></label>
                    <textarea id="review_text" name="review_text" class="form-control" placeholder="What did you love about your visit?" required></textarea>
                </div>

                <div class="form-group">
                    <label for="user_name" class="form-label">Name <span style="color: var(--text-muted); font-weight: 400; font-size: 0.85rem;">(Optional)</span></label>
                    <input type="text" id="user_name" name="user_name" class="form-control" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="user_email" class="form-label">Email <span style="color: var(--text-muted); font-weight: 400; font-size: 0.85rem;">(Optional)</span></label>
                    <input type="email" id="user_email" name="user_email" class="form-control" placeholder="john@example.com">
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="btnText">Submit Review</span>
                    <div class="spinner" id="btnSpinner"></div>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('reviewForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const formContainer = document.getElementById('formContainer');
            const successMessage = document.getElementById('successMessage');

            // Optional: Auto-fill branch_id if provided in URL parameters (e.g. ?branch=BR-101)
            const urlParams = new URLSearchParams(window.location.search);
            const branchParam = urlParams.get('branch');
            if (branchParam) {
                const branchInput = document.getElementById('branch_id');
                branchInput.value = branchParam;
                branchInput.setAttribute('readonly', true);
                branchInput.style.backgroundColor = 'var(--bg-color)';
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Validate rating
                const rating = document.querySelector('input[name="rating"]:checked');
                if (!rating) {
                    alert('Please select a star rating.');
                    return;
                }

                // Gather data corresponding to the DB schema
                const formData = {
                    branch_id: document.getElementById('branch_id').value.trim(),
                    user_name: document.getElementById('user_name').value.trim() || null,
                    user_email: document.getElementById('user_email').value.trim() || null,
                    rating: parseInt(rating.value),
                    review_text: document.getElementById('review_text').value.trim(),
                    platform: 'Web QR'
                };

                // UI Loading State
                submitBtn.disabled = true;
                btnText.style.display = 'none';
                btnSpinner.style.display = 'block';

                try {
                    const response = await fetch('http://localhost:3002/api/reviews', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify(formData)
                    });

                    const contentType = response.headers.get("content-type");
                    if (!contentType || !contentType.includes("application/json")) {
                        throw new TypeError("Backend did not return JSON. Make sure your Node.js server is running on port 3000.");
                    }

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Network response was not ok');
                    }

                    console.log('Successfully saved to Supabase:', data);

                    formContainer.style.display = 'none';
                    successMessage.style.display = 'block';

                } catch (error) {
                    console.error('Error submitting review:', error);
                    alert('Error: ' + error.message);
                    
                    submitBtn.disabled = false;
                    btnText.style.display = 'block';
                    btnSpinner.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
