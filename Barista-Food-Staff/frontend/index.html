<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barista Staff Portal – Login</title>
  <link rel="icon" type="image/png" href="assests/hero-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --coffee:   #3b1f0a;
      --espresso: #5c2d0e;
      --caramel:  #c9874f;
      --cream:    #f5e9d9;
      --gold:     #d4a055;
      --white:    #ffffff;
    }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0a02 0%, #3b1f0a 40%, #5c2d0e 100%);
      overflow: hidden;
      position: relative;
    }

    .bokeh {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.18;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .bokeh:nth-child(1) { width: 420px; height: 420px; background: var(--caramel); top: -100px; left: -100px; animation-delay: 0s; }
    .bokeh:nth-child(2) { width: 300px; height: 300px; background: var(--gold);    bottom: -80px; right: -80px; animation-delay: 3s; }
    .bokeh:nth-child(3) { width: 200px; height: 200px; background: var(--cream);   top: 50%; left: 55%; animation-delay: 1.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    .steam-wrap { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .steam {
      width: 6px; height: 40px;
      border-radius: 50px;
      background: linear-gradient(to top, rgba(255,255,255,0.6), transparent);
      animation: steam 2s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .steam:nth-child(2) { animation-delay: 0.4s; }
    .steam:nth-child(3) { animation-delay: 0.8s; }

    @keyframes steam {
      0%   { transform: scaleY(0.5) translateY(0); opacity: 0; }
      50%  { opacity: 1; }
      100% { transform: scaleY(1.4) translateY(-20px); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 52px 44px 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55);
      animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-ring {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--caramel), var(--gold));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
      box-shadow: 0 8px 24px rgba(201,135,79,0.45);
    }
    .logo-ring svg { width: 36px; height: 36px; fill: var(--white); }

    .card-title {
      text-align: center;
      color: var(--cream);
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .card-sub {
      text-align: center;
      color: rgba(245,233,217,0.5);
      font-size: 0.88rem;
      margin-bottom: 36px;
    }

    .field { margin-bottom: 18px; }
    label {
      display: block;
      color: var(--cream);
      font-size: 0.82rem;
      font-weight: 500;
      margin-bottom: 7px;
      letter-spacing: 0.4px;
    }
    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      stroke: rgba(245,233,217,0.4);
      fill: none;
      transition: stroke 0.25s;
    }
    input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: var(--cream);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }
    input::placeholder { color: rgba(245,233,217,0.3); }
    input:focus {
      border-color: var(--caramel);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(201,135,79,0.2);
    }
    input:focus + svg,
    .input-wrap:focus-within svg { stroke: var(--caramel); }

    .input-wrap { display: flex; align-items: center; }
    .input-wrap input { order: 1; }
    .input-wrap svg { order: 2; position: absolute; }

    .row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .check-label {
      display: flex; align-items: center; gap: 8px;
      color: rgba(245,233,217,0.6); font-size: 0.82rem; cursor: pointer;
    }
    .check-label input[type="checkbox"] {
      width: 16px; height: 16px; padding: 0; accent-color: var(--caramel);
    }
    .forgot { color: var(--gold); font-size: 0.82rem; text-decoration: none; transition: opacity 0.2s; }
    .forgot:hover { opacity: 0.75; }

    .btn-login {
      width: 100%;
      padding: 15px;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--caramel) 0%, var(--gold) 100%);
      color: var(--coffee);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 6px 24px rgba(201,135,79,0.45);
      transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
      position: relative; overflow: hidden;
    }
    .btn-login::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(201,135,79,0.55); }
    .btn-login:hover::after { background: rgba(255,255,255,0.08); }
    .btn-login:active { transform: translateY(0); box-shadow: 0 4px 14px rgba(201,135,79,0.35); }

    .btn-login .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: scale(0);
      animation: ripple 0.55s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 20px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: rgba(255,255,255,0.1);
    }
    .divider span { color: rgba(245,233,217,0.35); font-size: 0.78rem; }

    .footer-note {
      text-align: center;
      color: rgba(245,233,217,0.35);
      font-size: 0.78rem;
      margin-top: 4px;
    }
    .footer-note a { color: var(--gold); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    .error-message {
      color: #ff6b6b;
      text-align: center;
      margin-bottom: 12px;
      font-size: 0.85rem;
      display: none;
    }
    .success-message {
      color: #2ecc71;
      text-align: center;
      margin-bottom: 12px;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>

  <div class="bokeh"></div>
  <div class="bokeh"></div>
  <div class="bokeh"></div>

  <div class="card">

    <div class="steam-wrap">
      <div class="steam"></div>
      <div class="steam"></div>
      <div class="steam"></div>
    </div>

    <div class="logo-ring">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20h36l-4 24H14L10 20z"/>
        <path d="M46 26h6a6 6 0 0 1 0 12h-6"/>
        <rect x="18" y="8" width="4" height="8" rx="2"/>
        <rect x="28" y="6" width="4" height="10" rx="2"/>
        <rect x="38" y="8" width="4" height="8" rx="2"/>
      </svg>
    </div>

    <h1 class="card-title">Staff Portal</h1>
    <p class="card-sub">Barista &amp; Food Staff — Sign in to continue</p>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

      <div class="field">
        <label for="member_id">Staff ID</label>
        <div class="input-wrap">
          <input id="member_id" type="text" placeholder="EMP-1001" required/>
          <svg viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input id="email" type="email" placeholder="you@company.com" required/>
          <svg viewBox="0 0 24 24" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
      </div>

      <div class="row">
        <label class="check-label">
          <input type="checkbox" id="remember"/> Remember me
        </label>
        <a href="#" class="forgot">Forgot member ID?</a>
      </div>

      <button id="loginBtn" class="btn-login" type="submit">Sign In</button>

    </form>

    <div class="divider"><span>or contact your manager</span></div>
    <p class="footer-note">New staff? <a href="#">Request account access</a></p>

  </div>

  <script>
    document.getElementById('loginBtn').addEventListener('click', function(e) {
      const btn = this;
      const circle = document.createElement('span');
      const diameter = Math.max(btn.clientWidth, btn.clientHeight);
      const radius = diameter / 2;
      const rect = btn.getBoundingClientRect();
      circle.style.width = circle.style.height = diameter + 'px';
      circle.style.left = (e.clientX - rect.left - radius) + 'px';
      circle.style.top  = (e.clientY - rect.top  - radius) + 'px';
      circle.classList.add('ripple');
      btn.querySelector('.ripple')?.remove();
      btn.appendChild(circle);
    });

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      const member_id = document.getElementById('member_id').value.trim();
      const email = document.getElementById('email').value.trim();

      // Clear previous messages
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      if (!member_id || !email) {
        errorDiv.textContent = 'Please fill in all fields';
        errorDiv.style.display = 'block';
        return;
      }

      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        const response = await fetch('/api/signin', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            member_id,
            email
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        successDiv.textContent = `✓ Welcome back, ${data.data.name || 'Staff Member'}!`;
        successDiv.style.display = 'block';
        btn.textContent = '✓ Welcome back!';
        btn.style.background = 'linear-gradient(135deg,#27ae60,#2ecc71)';
        
        // Store staff info and redirect
        localStorage.setItem('staffMember', JSON.stringify(data.data));
        setTimeout(() => {
          window.location.href = './dashboard.html';
        }, 1400);
      } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = error.message || 'Invalid Staff ID or Email';
        errorDiv.style.display = 'block';
        btn.style.background = 'linear-gradient(135deg,#c0392b,#e74c3c)';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
